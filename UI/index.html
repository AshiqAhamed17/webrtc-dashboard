<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Camera Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="dashboard-header">
        <div>
            <h1>Live Camera Dashboard</h1>
            <p class="dashboard-header__sub">MediaMTX &bull; WebRTC &bull; FFmpeg</p>
        </div>
        <div class="dashboard-header__stats">
            <div class="header-stat">
                <span class="header-stat__label">Active</span>
                <span class="header-stat__value" id="stat-active">0 / 4</span>
            </div>
            <div class="header-stat">
                <span class="header-stat__label">Total Reconnects</span>
                <span class="header-stat__value" id="stat-reconnects">0</span>
            </div>
        </div>
    </header>

    <main id="grid" class="grid"></main>

    <script src="reader.js"></script>
    <script src="script.js?v=4"></script>

</body>

</html>
