services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx

    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
      - "8189:8189/udp"

    volumes:
      - ./mediamtx.yml:/mediamtx.yml

  ffmpeg:
    image: jrottenberg/ffmpeg:latest
    container_name: ffmpeg

    depends_on:
      - mediamtx

    volumes:
      - ./:/videos

    command: >
      -re
      -stream_loop -1
      -i /videos/sampleVid.mp4
      -vf scale=1920:1080
      -c:v libx264
      -preset veryfast
      -tune zerolatency
      -b:v 3M
      -maxrate 3M
      -bufsize 6M
      -pix_fmt yuv420p
      -c:a aac
      -b:a 128k
      -f rtsp
      rtsp://mediamtx:8554/live